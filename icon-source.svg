<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Imagine App icon source (IMA-12): yellow price tag with the wordmark
       "?" on Price Tag slate. Not shipped — public/ icons are rendered from
       this template.

       Regenerate (needs the Archivo Black font installed for fontconfig,
       e.g. google/fonts ofl/archivoblack, plus rsvg-convert + imagemagick):
         sed 's/{{SCALE}}/1.32/' icon-source.svg > /tmp/any.svg       # purpose "any" + apple + favicon
         sed 's/{{SCALE}}/1.02/' icon-source.svg > /tmp/mask.svg      # maskable (80% safe zone)
         rsvg-convert -w 192 -h 192 /tmp/any.svg  -o public/icon-192.png
         rsvg-convert -w 512 -h 512 /tmp/any.svg  -o public/icon-512.png
         rsvg-convert -w 192 -h 192 /tmp/mask.svg -o public/icon-maskable-192.png
         rsvg-convert -w 512 -h 512 /tmp/mask.svg -o public/icon-maskable-512.png
         rsvg-convert -w 180 -h 180 /tmp/any.svg  -o public/apple-touch-icon.png
         rsvg-convert -w 48 -h 48 /tmp/any.svg -o /tmp/fav48.png
         magick /tmp/fav48.png -define icon:auto-resize=48,32,16 public/favicon.ico
  -->
  <defs>
    <radialGradient id="floor" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#1c2634"/>
      <stop offset="60%" stop-color="#151d28"/>
      <stop offset="100%" stop-color="#0d131b"/>
    </radialGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe14d"/>
      <stop offset="100%" stop-color="#ffd60a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#floor)"/>
  <g transform="translate(256 256) scale({{SCALE}}) rotate(-14) translate(-256 -256)">
    <!-- Tag body: pointed nose on the left, rounded corners on the right. -->
    <path d="M 210 178
             L 130 240
             a 20 20 0 0 0 0 32
             L 210 334
             L 368 334
             a 28 28 0 0 0 28 -28
             L 396 206
             a 28 28 0 0 0 -28 -28
             Z"
          fill="url(#tag)"/>
    <!-- Punched hole -->
    <circle cx="188" cy="256" r="19" fill="#0d131b"/>
    <!-- The question mark -->
    <text x="295" y="311" font-family="Archivo Black" font-size="160"
          text-anchor="middle" fill="#171200">?</text>
  </g>
</svg>
